<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live2D Murasame Demo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: transparent;
            font-family: sans-serif;
            user-select: none;
            /* Debug Border / 调试边框 */
            /* Used to visualize the window boundaries during development */
            /* 用于在开发过程中可视化窗口边界 */
            border: 2px solid #ddf904; /* Green visible border / 绿色可见边框 */
            box-sizing: border-box;
            height: 1000vh;
            width: 1000vw;
        }
        canvas {
            display: block;
        }
        /* Chat Bubble Style */
        #chat-bubble {
            position: absolute;
            width: 200px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            color: #333;
            display: none;
            z-index: 1000;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        #chat-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 20px;
            border-width: 10px;
            border-style: solid;
            border-color: rgba(255, 255, 255, 0.9) transparent transparent transparent;
        }
        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        #error-log {
            position: absolute;
            top: 0;
            left: 0;
            color: red;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            display: none;
            z-index: 1000;
        }
    </style>
    <!-- Cubism Core -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    
    <!-- PixiJS v5 (Stable for Live2D) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/5.3.10/pixi.min.js"></script>
    
    <!-- pixi-live2d-display (Cubism 4 build) -->
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="chat-bubble"></div>

    <div id="error-log"></div>

    <script>
        function logError(msg) {
            console.error(msg);
            const el = document.getElementById('error-log');
            el.style.display = 'block';
            el.innerHTML += msg + '<br>';
        }

        window.onload = async () => {
            try {
                if (!window.Live2DCubismCore) {
                    logError('Live2DCubismCore not loaded!');
                }
                if (!window.PIXI) {
                    logError('PIXI not loaded!');
                }
                
                // Expose PIXI to window if not already (Pixi v6 usually does)
                window.PIXI = window.PIXI || PIXI;

                // Check if pixi-live2d-display loaded
                if (!PIXI.live2d) {
                    logError('PIXI.live2d not found. Library might not be loaded.');
                    return;
                }
                
                console.log('PIXI.live2d keys:', Object.keys(PIXI.live2d));
                if (window.Live2DModel) console.log('window.Live2DModel exists');

                const Live2DModel = PIXI.live2d.Live2DModel || window.Live2DModel;
                if (!Live2DModel) {
                    logError('Live2DModel class not found in PIXI.live2d or window!');
                    logError('PIXI.live2d keys: ' + Object.keys(PIXI.live2d).join(', '));
                    return;
                }

                console.log('Libraries loaded successfully.');

                const app = new PIXI.Application({
                    view: document.getElementById('canvas'),
                    autoStart: true,
                    resizeTo: window,
                    transparent: true,
                    backgroundAlpha: 0
                });

                // Path to your model
                // 注意：因为 index.html 现在在 src/renderer 目录，而模型在 assets 目录
                // 相对路径应该是 ../../assets/Murasame/Murasame.model3.json
                // const modelPath = '../../assets/Murasame/Murasame.model3.json';
                const modelPath = '../../assets/Jellyfish/星月水母 试用版.model3.json';
                
                console.log('Loading model from:', modelPath);

                const model = await Live2DModel.from(modelPath);

                app.stage.addChild(model);

                // Auto scale and center function / 自动缩放和居中函数
                let isModelScaled = false; // Flag to lock scale after first calculation / 用于锁定缩放比例的标志
                
                const resizeModel = () => {
                    if (!model) return;
                    
                    // 仅在初始化时计算一次缩放，之后保持不变 (锁定大小)
                    // Only calculate scale once at initialization to lock the size
                    if (!isModelScaled) {
                        // 调整缩放逻辑：目标是只展示上半身的三分之二
                        // Logic: We want to show the upper 2/3 of the body.
                        
                        // scaleX: 窗口宽度的 80% / 模型宽度
                        const scaleX = (innerWidth * 0.8) / model.width; 
                        
                        // scaleY: 窗口高度的 1.5倍 / 模型高度 (1.5倍是为了让模型更大，从而超出屏幕底部，只显示上半部分)
                        // scaleY: 1.5x window height to make model larger, pushing lower body off-screen
                        const scaleY = (innerHeight * 1.5) / model.height; 
                        
                        // 使用较大的缩放比例，确保填满并裁剪
                        // Use the larger scale factor to ensure filling and cropping
                        const scale = Math.max(scaleX, scaleY) * 0.8; 
                        
                        model.scale.set(scale);
                        isModelScaled = true; // Lock scale / 锁定缩放
                    }
                    
                    // 水平居中 (位置随窗口变化而调整，保持居中)
                    // Horizontal centering (updates with window resize)
                    model.x = (innerWidth - model.width) / 2;
                    
                    // 垂直定位：头部距离顶部 10%
                    // Vertical positioning: Head at 10% from top
                    model.y = innerHeight * 0.1; 
                };

                // Initial resize
                resizeModel();

                // Handle window resize
                window.addEventListener('resize', resizeModel);
                
                // 初始状态下，让鼠标穿透，但允许 forward (这样才能检测到 pointerover)
                window.electronAPI.setIgnoreMouseEvents(true, { forward: true });

                model.interactive = true;
                
                let isMouseOver = false;

                // 鼠标移入模型：捕获鼠标
                model.on('pointerover', () => {
                    isMouseOver = true;
                    if (!window.isDragging) {
                        window.electronAPI.setIgnoreMouseEvents(false);
                    }
                });

                // 鼠标移出模型：恢复穿透
                model.on('pointerout', () => {
                    isMouseOver = false;
                    if (!window.isDragging) {
                        window.electronAPI.setIgnoreMouseEvents(true, { forward: true });
                    }
                });

                // 监听拖拽结束事件，确保拖拽结束后如果鼠标不在模型上，恢复穿透
                document.addEventListener('drag-end', () => {
                    if (!isMouseOver) {
                        window.electronAPI.setIgnoreMouseEvents(true, { forward: true });
                    }
                });

                // 处理拖拽
                model.on('pointerdown', (e) => {
                    if (e.data.button === 0) { // 左键
                         // 逻辑在 window mousedown 中处理
                    }
                });
                
                // Handle companion messages
                window.electronAPI.onCompanionMessage((msg) => {
                    console.log('Received companion message:', msg);
                    
                    // Reset Audio for new message
                    if (msg.text) {
                        resetMediaSource();
                    }
                    
                    // 1. Show Text in Bubble
                    if (msg.text) {
                        const bubble = document.getElementById('chat-bubble');
                        bubble.textContent = msg.text;
                        bubble.style.display = 'block';
                        
                        // Update Bubble Position based on Model Position
                        if (model) {
                            // Calculate model bounds
                            const bounds = model.getBounds();
                            
                            // Position bubble above the head
                            // model.x/y is usually top-left or center depending on anchor. 
                            // Live2DModel usually has anchor at 0,0 (top-left) by default but we set x,y to center it?
                            // Wait, we set model.x = ... to center it in screen.
                            
                            // Let's use getBounds() which is safer.
                            // bounds.x, bounds.y, bounds.width, bounds.height
                            
                            // Center horizontally relative to model
                            let left = bounds.x + bounds.width / 2 - 100; // 100 is half of bubble width (200/2)
                            
                            // Position above the head
                            let top = bounds.y - 60; // 60px above model top
                            
                            // Ensure within screen
                            if (left < 10) left = 10;
                            if (left + 220 > window.innerWidth) left = window.innerWidth - 220;
                            if (top < 10) top = 10; // If too high, maybe put it lower? 
                            // If model is very high, bubble might be cut off.
                            // Let's just try to put it at bounds.y + some offset if it's too high?
                            // Or put it inside the model area if top is negative.
                            if (top < 0) top = 20;

                            bubble.style.left = left + 'px';
                            bubble.style.top = top + 'px';
                        }

                        // Auto hide after 5 seconds
                        setTimeout(() => {
                            bubble.style.display = 'none';
                        }, 5000);
                    }

                    // 2. Play Motion
                    if (msg.motion) {
                        // Find motion group
                        // Model motions are stored in model.internalModel.motionManager.definitions
                        // But pixi-live2d-display provides model.motion() which usually takes group name.
                        // We try to match loosely.
                        try {
                            model.motion(msg.motion);
                        } catch (e) {
                            console.warn('Motion not found:', msg.motion);
                            model.motion('TapBody'); // Fallback (Changed from 'Tap' to 'TapBody' for Jellyfish)
                        }
                    }

                    // 3. Set Expression
                    if (msg.expression) {
                        try {
                            if (model.setVirtualExpression) {
                                model.setVirtualExpression(msg.expression);
                            } else {
                                model.expression(msg.expression);
                            }
                        } catch (e) {
                            console.warn('Expression not found:', msg.expression);
                        }
                    }
                });
                
                console.log('Model loaded!');

                // Check and log motion definitions
                if (model.internalModel && model.internalModel.motionManager) {
                     console.log('Motion Definitions:', model.internalModel.motionManager.definitions);
                     console.log('Motion Groups:', model.internalModel.motionManager.motionGroups);
                     
                     // Force start idle motion if not playing
                     // 强制启动待机动作 (如果未自动播放)
                     // pixi-live2d-display usually auto-plays idle, but let's make sure.
                     // We use a small delay to ensure everything is initialized.
                     // 使用延迟确保初始化完成后再尝试播放。
                     setTimeout(() => {
                        console.log('Force checking idle motion...');
                        try {
                            // Try to play 'Idle' motion group defined in .model3.json
                            // 尝试播放 .model3.json 中定义的 'Idle' 动作组
                            model.motion('Idle');
                        } catch(e) {
                            console.error('Failed to start Idle motion:', e);
                        }
                     }, 1000);
                }

                // Initialize UI
                // initUI(model);
                
                // Initialize VTube Studio Adapter (for custom parameter mapping)
                initVTubeStudioAdapter(model, app);

                // Attempt to remove potential watermark
                // 尝试移除可能存在的水印 (通过隐藏包含 logo/watermark 等关键词的部件或参数)
                removeWatermark(model);

                // Initialize External Control (Electron)
                initExternalControl(model);

                // Initialize Window Drag and Resize
                initWindowControl();

            } catch (e) {
                logError('Runtime Error: ' + e.message + '\n' + e.stack);
            }
        };

        // Helper function to remove watermark from model (Trial Version)
        // 尝试移除模型水印的辅助函数 (试用版通常会包含水印)
        function removeWatermark(model) {
            console.log('Attempting to remove watermark...');
            
            // Keywords to search for in ArtMesh names or Parameter IDs
            // 在 ArtMesh 名称或参数 ID 中搜索的关键词
            const keywords = ['watermark', 'logo', 'copyright', 'credit', 'trial', 'author', 'name', 'sign', 'text'];
            
            try {
                // 1. Check ArtMeshes (pixi-live2d-display exposes meshes)
                if (model.meshes) {
                    model.meshes.forEach(mesh => {
                        // mesh.name is usually the ArtMesh ID from Cubism Editor
                        const name = (mesh.name || '').toLowerCase();
                        
                        // Check if name contains any keyword
                        if (keywords.some(k => name.includes(k))) {
                            console.log(`Hiding mesh: ${mesh.name}`);
                            mesh.alpha = 0;      // Set opacity to 0
                            mesh.visible = false; // Hide from rendering
                        }
                    });
                }
                
                // 2. Check Parameters (Some models use a parameter to toggle watermark opacity)
                // Cubism 4 Core
                if (model.internalModel && model.internalModel.coreModel) {
                    const core = model.internalModel.coreModel;
                    // Check if getParameterCount exists (Cubism 4)
                    if (core.getParameterCount) {
                        const count = core.getParameterCount();
                        const ids = core.getParameterIds(); // Array of strings
                        
                        for (let i = 0; i < count; i++) {
                            const id = ids[i];
                            const name = id.toLowerCase(); 
                            
                            if (keywords.some(k => name.includes(k))) {
                                console.log(`Disabling parameter: ${id}`);
                                // Set parameter to 0 (usually means hidden/off)
                                core.setParameterValueByIndex(i, 0); 
                            }
                        }
                    }
                }
                
                // 3. Check Parts (Parts control visibility of groups of ArtMeshes)
                // Cubism 4 Core
                if (model.internalModel && model.internalModel.coreModel && model.internalModel.coreModel.getPartCount) {
                     const core = model.internalModel.coreModel;
                     const count = core.getPartCount();
                     const ids = core.getPartIds(); // Array of strings
                     
                     for (let i = 0; i < count; i++) {
                         const id = ids[i];
                         const name = id.toLowerCase();
                         
                         if (keywords.some(k => name.includes(k))) {
                             console.log(`Hiding part: ${id}`);
                             // Set part opacity to 0
                             core.setPartOpacityByIndex(i, 0);
                         }
                     }
                }
                
            } catch (e) {
                console.warn('Failed to remove watermark:', e);
            }
        }

        // Initialize VTube Studio Adapter (for custom parameter mapping)
        // 初始化 VTube Studio 适配器 (用于自定义参数映射)
        // This function maps standard mouse inputs and virtual expressions to VTube Studio-specific parameters.
        function initVTubeStudioAdapter(model, app) {
            console.log('Initializing VTube Studio Adapter...');
            
            // --- Virtual Expressions Definition / 虚拟表情定义 ---
            // These define parameter overrides to simulate emotions.
            // 当触发这些表情时，对应的参数会被强制设置，覆盖默认值。
            const virtualExpressions = {
                'Happy': {
                    'ParamMouthForm2': 1.0, // Smile / 微笑嘴型
                    'ParamEyeLSmile': 1.0,  // Left Eye Smile / 左眼笑
                    'ParamEyeRSmile': 1.0,  // Right Eye Smile / 右眼笑
                    'ParamEyeLOpen': 0.8,   // Left Eye Openness / 左眼张开度
                    'ParamEyeROpen': 0.8    // Right Eye Openness / 右眼张开度
                },
                'Sad': {
                    'ParamMouthForm2': -1.0, // Frown / 悲伤嘴型
                    'ParamBrowRY2': -0.5,    // Brows down / 眉毛下垂
                    'ParamEyeLOpen': 0.8,
                    'ParamEyeROpen': 0.8
                },
                'Surprised': {
                    'ParamMouthOpenY': 0.5, // Mouth Open / 张嘴
                    'ParamEyeLOpen': 1.2,   // Wide Eyes / 瞪眼
                    'ParamEyeROpen': 1.2,
                    'ParamBrowRY2': 0.5     // Brows up / 眉毛上扬
                },
                'Angry': {
                    'ParamBrowRY2': -0.8,   // Brows Furrowed / 皱眉
                    'ParamEyeLOpen': 0.9,
                    'ParamEyeROpen': 0.9,
                    'ParamMouthForm2': -0.5 // Angry Mouth / 愤怒嘴型
                },
                'Neutral': {} // Reset to default / 重置
            };

            model.currentExpressionParams = {};
            model.targetExpressionParams = {};
            
            // Method to set virtual expression / 设置虚拟表情的方法
            model.setVirtualExpression = (name) => {
                console.log('Setting virtual expression:', name);
                const target = virtualExpressions[name];
                if (target) {
                    model.targetExpressionParams = target;
                } else {
                    console.warn('Virtual expression not found:', name);
                    // Optionally reset if not found / 如果未找到则重置
                    if (name === 'Reset' || name === 'Neutral') {
                        model.targetExpressionParams = {};
                    }
                }
            };
            
            // 1. Auto Breathing (ParamBreath) / 自动呼吸模拟
            // VTube Studio models often use 'ParamBreath' which needs manual oscillation.
            let breathTime = 0;
            
            // 2. Mouse Tracking (Map to custom parameters) / 鼠标追踪 (映射到自定义参数)
            // VTube Studio uses specific parameters for head movement:
            // ParamAngleX2, ParamAngleX3, ParamAngleX4 (instead of standard ParamAngleX/Y/Z)
            
            let mouseX = 0; // -1 to 1 (Left to Right)
            let mouseY = 0; // -1 to 1 (Top to Bottom)
            
            window.addEventListener('mousemove', (e) => {
                // Calculate normalized mouse position relative to window center
                // 计算相对于窗口中心的归一化鼠标位置
                mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                mouseY = (e.clientY / window.innerHeight) * 2 - 1;
            });
            
            // Add update loop to PixiJS ticker / 添加到 PixiJS 更新循环
            app.ticker.add((delta) => {
                if (!model || !model.internalModel || !model.internalModel.coreModel) return;
                
                // --- Breathing Implementation / 呼吸实现 ---
                breathTime += delta * 0.05;
                const breathValue = (Math.sin(breathTime) + 1) / 2; // Oscillate 0 to 1
                setParam(model, 'ParamBreath', breathValue);
                
                // --- Head Tracking / 头部追踪 ---
                // Mapping mouse position to head angles with smoothing
                // 将鼠标位置映射到头部角度，并添加平滑处理
                
                const smoothing = 0.1; // Smoothing factor (0.1 = slow, 1.0 = instant)
                
                if (!model.adapterState) {
                    model.adapterState = {
                        headX: 0, headY: 0, headZ: 0,
                        eyeX: 0, eyeY: 0
                    };
                }
                
                // Target angles based on mouse position
                const targetHeadX = mouseX * 30;  // Max 30 degrees
                const targetHeadY = -mouseY * 30; // Invert Y for natural look
                const targetHeadZ = mouseX * 10;  // Slight tilt with horizontal movement
                
                // Apply smoothing (Linear Interpolation) / 应用平滑插值
                model.adapterState.headX += (targetHeadX - model.adapterState.headX) * smoothing;
                model.adapterState.headY += (targetHeadY - model.adapterState.headY) * smoothing;
                model.adapterState.headZ += (targetHeadZ - model.adapterState.headZ) * smoothing;
                
                // Set VTube Studio specific parameters / 设置 VTube Studio 特有参数
                setParam(model, 'ParamAngleX2', model.adapterState.headX); 
                setParam(model, 'ParamAngleX3', model.adapterState.headY); 
                setParam(model, 'ParamAngleX4', model.adapterState.headZ); 
                
                // Set standard parameters as backup / 设置标准参数作为备份
                setParam(model, 'ParamAngleX', model.adapterState.headX);
                setParam(model, 'ParamAngleY', model.adapterState.headY);
                setParam(model, 'ParamAngleZ', model.adapterState.headZ);

                // --- Eye Tracking / 眼球追踪 ---
                const targetEyeX = mouseX;
                const targetEyeY = -mouseY;
                
                model.adapterState.eyeX += (targetEyeX - model.adapterState.eyeX) * smoothing;
                model.adapterState.eyeY += (targetEyeY - model.adapterState.eyeY) * smoothing;
                
                setParam(model, 'ParamEyeBallX', model.adapterState.eyeX);
                setParam(model, 'ParamEyeBallY', model.adapterState.eyeY);

                // --- Virtual Expressions (Override) / 虚拟表情 (覆盖) ---
                // Apply expression parameters last to override any other values
                // 最后应用表情参数，以覆盖其他值的变化
                if (model.targetExpressionParams) {
                    for (const [paramId, targetValue] of Object.entries(model.targetExpressionParams)) {
                         setParam(model, paramId, targetValue);
                    }
                }
            });
        }
        
        // Helper function to safely set Live2D parameters
        // 安全设置 Live2D 参数的辅助函数
        function setParam(model, paramId, value) {
            if (model.internalModel && model.internalModel.coreModel) {
                 // Cubism 4
                 model.internalModel.coreModel.setParameterValueById(paramId, value);
            } else if (model.internalModel) {
                 // Cubism 2 or other (fallback)
                 // model.internalModel.setParamFloat(paramId, value);
            }
        }

        function initWindowControl() {
        if (!window.electronAPI) return;

        window.isDragging = false;
        let startX, startY;
        
        window.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                // 注意：只有当 ignore=false 时（即鼠标在模型上），这里才会触发
                window.isDragging = true;
                startX = e.screenX;
                startY = e.screenY;
                window.electronAPI.startDrag({x: startX, y: startY});
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (window.isDragging) {
                const currentX = e.screenX;
                const currentY = e.screenY;
                window.electronAPI.drag({x: currentX, y: currentY});
            }
        });

        window.addEventListener('mouseup', () => {
             window.isDragging = false;
             window.electronAPI.stopDrag();
             document.dispatchEvent(new CustomEvent('drag-end'));
        });


    }

        function initExternalControl(model) {
            if (window.electronAPI) {
                console.log('Electron API found. Listening for commands...');
                window.electronAPI.onCommand((data) => {
                    console.log('Received external command:', data);
                    
                    // Handle Motion
                    if (data.motion) {
                        try {
                            model.motion(data.motion);
                            console.log('Triggered motion:', data.motion);
                        } catch (err) {
                            console.error('Failed to trigger motion:', err);
                        }
                    }

                    // Handle Expression
                    if (data.expression) {
                         try {
                            model.expression(data.expression);
                            console.log('Triggered expression:', data.expression);
                        } catch (err) {
                            console.error('Failed to trigger expression:', err);
                        }
                    }
                    
                    // Handle Expression Reset
                    if (data.resetExpression) {
                        model.expression(null);
                    }
                });
            } else {
                console.log('Electron API not found. Running in browser mode.');
            }
        }

        function initUI(model) {
            // --- Motions ---
            // Extract motion groups from internal model definitions if available, or use hardcoded list from analysis
            // The pixi-live2d-display parses definitions into internalModel.settings.motions
            // But sometimes structure varies. Let's try to inspect definitions or use known list.
            
            const motionGroups = ['Idle', 'Tapface', 'Taphair', 'Tapxiongbu', 'Tapqunzi', 'Tapleg'];
            const motionContainer = document.getElementById('motion-buttons');
            
            motionGroups.forEach(group => {
                const btn = document.createElement('button');
                btn.textContent = group;
                btn.onclick = () => {
                    console.log('Playing motion:', group);
                    model.motion(group);
                };
                motionContainer.appendChild(btn);
            });

            // --- Expressions ---
            // Expressions are stored in internalModel.settings.expressions usually
            // We saw exp1.exp3 to exp7.exp3 in the file
            const expressions = ['exp1.exp3', 'exp2.exp3', 'exp3.exp3', 'exp4.exp3', 'exp5.exp3', 'exp6.exp3', 'exp7.exp3'];
            const expContainer = document.getElementById('expression-buttons');

            // Add a "Reset Expression" button
            const resetBtn = document.createElement('button');
            resetBtn.textContent = 'Reset';
            resetBtn.style.backgroundColor = '#6c757d';
            resetBtn.onclick = () => {
                model.expression(null); // Or clear expression
                // Sometimes setting empty expression works, or need to verify API
                // For pixi-live2d-display, usually passing null clears it or sets default? 
                // Actually, expressions are additive or replacement. 
                // Let's just try setting the first one as default if null fails, but let's assume valid API usage.
                console.log('Resetting expression');
            };
            expContainer.appendChild(resetBtn);

            expressions.forEach(exp => {
                const btn = document.createElement('button');
                btn.textContent = exp.split('.')[0]; // Show "exp1" instead of "exp1.exp3"
                btn.onclick = () => {
                    console.log('Setting expression:', exp);
                    model.expression(exp);
                };
                expContainer.appendChild(btn);
            });

            // --- Parameters ---
            // Common parameters to control
            const paramList = [
                { id: 'ParamAngleX', name: 'Head X', min: -30, max: 30 },
                { id: 'ParamAngleY', name: 'Head Y', min: -30, max: 30 },
                { id: 'ParamAngleZ', name: 'Head Z', min: -30, max: 30 },
                { id: 'ParamEyeLOpen', name: 'Eye L Open', min: 0, max: 1, default: 1 },
                { id: 'ParamEyeROpen', name: 'Eye R Open', min: 0, max: 1, default: 1 },
                { id: 'ParamEyeBallX', name: 'Eye Ball X', min: -1, max: 1 },
                { id: 'ParamEyeBallY', name: 'Eye Ball Y', min: -1, max: 1 },
                { id: 'ParamBodyAngleX', name: 'Body X', min: -10, max: 10 },
                { id: 'ParamMouthOpenY', name: 'Mouth Open', min: 0, max: 1 },
            ];

            const paramContainer = document.getElementById('param-controls');
            
            // Store active overrides
            const overrides = {};

            paramList.forEach(p => {
                const row = document.createElement('div');
                row.className = 'param-row';
                
                const label = document.createElement('div');
                label.className = 'param-label';
                label.textContent = p.name;
                
                const input = document.createElement('input');
                input.type = 'range';
                input.min = p.min;
                input.max = p.max;
                input.step = 0.01;
                input.value = p.default || 0;
                
                const valDisplay = document.createElement('div');
                valDisplay.className = 'value-display';
                valDisplay.textContent = input.value;

                input.addEventListener('input', (e) => {
                    const val = parseFloat(e.target.value);
                    valDisplay.textContent = val.toFixed(1);
                    overrides[p.id] = val;
                });

                // Double click to reset/release control
                input.addEventListener('dblclick', () => {
                    delete overrides[p.id];
                    valDisplay.textContent = '(Auto)';
                });

                row.appendChild(label);
                row.appendChild(input);
                row.appendChild(valDisplay);
                paramContainer.appendChild(row);
            });

            // Update loop to apply overrides
            // We hook into Pixi's ticker
            PIXI.Ticker.shared.add(() => {
                if (!model || !model.internalModel || !model.internalModel.coreModel) return;
                
                for (const [id, value] of Object.entries(overrides)) {
                    // This sets the parameter value, overriding physics for this frame
                    // Note: setParameterValueById is standard Cubism Core API
                    model.internalModel.coreModel.setParameterValueById(id, value);
                }
            });
        }
        // --- TTS Audio Handling ---
        const ttsAudio = document.createElement('audio');
        ttsAudio.id = 'tts-audio';
        document.body.appendChild(ttsAudio);

        let mediaSource = new MediaSource();
        let sourceBuffer = null;
        let queue = [];
        let isSourceOpen = false;

        function resetMediaSource() {
            if (ttsAudio) {
                ttsAudio.pause();
                ttsAudio.currentTime = 0;
            }
            if (mediaSource && mediaSource.readyState === 'open') {
                try {
                    mediaSource.endOfStream();
                } catch (e) { /* ignore */ }
            }
            
            mediaSource = new MediaSource();
            ttsAudio.src = URL.createObjectURL(mediaSource);
            queue = [];
            isSourceOpen = false;
            
            mediaSource.addEventListener('sourceopen', () => {
                isSourceOpen = true;
                try {
                    if (MediaSource.isTypeSupported('audio/mpeg')) {
                        sourceBuffer = mediaSource.addSourceBuffer('audio/mpeg');
                        sourceBuffer.addEventListener('updateend', processQueue);
                        processQueue();
                    } else {
                        console.error('audio/mpeg not supported for MediaSource');
                    }
                } catch (e) {
                    console.error('AddSourceBuffer error', e);
                }
            });
        }

        function processQueue() {
            if (queue.length > 0 && sourceBuffer && !sourceBuffer.updating) {
                try {
                    sourceBuffer.appendBuffer(queue.shift());
                } catch (e) {
                    console.error('AppendBuffer error', e);
                    if (e.name === 'QuotaExceededError') {
                        resetMediaSource();
                    }
                }
            }
        }

        // Initialize
        resetMediaSource();

        function hexToUint8Array(hex) {
            if (!hex) return new Uint8Array(0);
            const len = hex.length;
            const bytes = new Uint8Array(len / 2);
            for (let i = 0; i < len; i += 2) {
                bytes[i / 2] = parseInt(hex.substring(i, i + 2), 16);
            }
            return bytes;
        }

        if (window.electronAPI && window.electronAPI.onTTSChunk) {
            window.electronAPI.onTTSChunk((hexChunk) => {
                const bytes = hexToUint8Array(hexChunk);
                queue.push(bytes);
                
                if (isSourceOpen) {
                    processQueue();
                }

                if (ttsAudio.paused) {
                    ttsAudio.play().catch(e => console.error('Play error', e));
                }
            });
        }
    </script>
</body>
