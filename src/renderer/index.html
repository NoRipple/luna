<!DOCTYPE html>
<!-- 主要职责：定义桌宠覆盖层窗口的 HTML 结构，是渲染层主入口页面。 -->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live2D Panel</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/5.3.10/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="chat-bubble"></div>

    <button id="chat-toggle" type="button" aria-expanded="false" data-open="false" aria-label="Chat">
        <span class="chat-toggle-label">Chat</span>
    </button>

    <div id="error-log"></div>

    <script src="./app.js"></script>
</body>
</html>
