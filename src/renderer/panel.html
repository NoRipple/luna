<!DOCTYPE html>
<!-- 主要职责：定义参考 Figma 工作台设计的聊天面板结构，仅保留导航、对话、感知信息、行为追踪和记忆系统区域。 -->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companion Panel</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./panel/styles/tokens.css">
    <link rel="stylesheet" href="./panel/styles/layout.css">
    <link rel="stylesheet" href="./panel/styles/chat.css">
    <link rel="stylesheet" href="./panel/styles/sidebar.css">
    <link rel="stylesheet" href="./panel/styles/timeline.css">
</head>
<body class="panel-window">
    <div id="panel-shell">
        <aside class="app-rail" aria-label="导航侧栏">
            <div class="app-brand">
                <div class="app-brand-mark">✦</div>
                <div class="app-brand-copy">
                    <strong>Agent OS</strong>
                    <span>Platinum</span>
                </div>
            </div>

            <div class="rail-section-label">功能模块</div>
            <nav class="app-nav">
                <button class="app-nav-item ghost" type="button" disabled>
                    <span>更多模块</span>
                    <span>等待扩展</span>
                </button>
            </nav>

            <button class="app-settings" type="button" disabled>
                <span class="app-settings-icon">⚙</span>
                <span>设置</span>
            </button>
        </aside>

        <main class="workspace-grid">
            <section class="main-column">
                <section class="chat-surface">
                    <header class="chat-header">
                        <div class="assistant-chip">✦</div>
                        <div class="chat-header-copy">
                            <h1>Platinum Assistant</h1>
                            <p>
                                <span class="status-dot"></span>
                                <span id="chat-status-meta">在线 · 等待响应</span>
                            </p>
                        </div>
                        <div class="chat-header-actions">
                            <span class="model-pill">GPT-4o</span>
                            <button id="chat-view-toggle" class="chat-view-toggle" type="button">真实视野</button>
                            <button class="header-dot-button" type="button" disabled>···</button>
                        </div>
                    </header>

                    <div id="chat-history" class="chat-stream"></div>

                    <footer class="composer-shell">
                        <div class="composer-frame">
                            <label class="sr-only" for="chat-input">发送消息</label>
                            <textarea id="chat-input" placeholder="发送消息... (Enter 发送, Shift+Enter 换行)" rows="2"></textarea>
                            <div class="composer-tools">
                                <button class="composer-icon" type="button" disabled>☺</button>
                                <button class="composer-icon" type="button" disabled>◌</button>
                                <button id="chat-send" class="composer-send" type="button">➤</button>
                            </div>
                        </div>
                        <div class="composer-meta">
                            <span id="composer-runtime">当前会话</span>
                            <span id="conversation-meta">0 条消息</span>
                        </div>
                    </footer>
                </section>

                <section class="trace-surface">
                    <header class="trace-header">
                        <div class="trace-header-copy">
                            <h2>实时行为追踪</h2>
                            <span class="trace-subtitle">统一主时间流 · 稳定展示近期工具与状态事件</span>
                        </div>
                        <div class="trace-header-meta">
                            <span id="trace-duration">--</span>
                            <span class="trace-live">
                                <span class="status-dot soft"></span>
                                LIVE
                            </span>
                        </div>
                    </header>
                    <div id="timeline-lanes" class="timeline-lanes"></div>
                </section>
            </section>

            <aside class="side-column">
                <section class="insight-surface">
                    <header class="insight-header">
                        <h2>AI 状态</h2>
                        <span class="live-inline">
                            <span class="status-dot soft"></span>
                            实时
                        </span>
                    </header>

                    <article class="insight-hero">
                        <div class="insight-avatar">AI</div>
                        <div>
                            <strong id="state-session-label">会话空闲</strong>
                            <p id="state-runtime-label">等待新的命令或自主轮次。</p>
                        </div>
                    </article>

                    <section class="insight-block insight-block-fixed insight-block-session">
                        <div class="insight-block-head">
                            <span>会话状态</span>
                            <strong id="state-session-value">空闲</strong>
                        </div>
                        <div class="state-progress-track">
                            <span id="state-progress-fill" class="state-progress-fill"></span>
                        </div>
                    </section>

                    <section class="insight-block insight-block-fixed insight-block-runtime">
                        <div class="insight-block-head">
                            <span>运行时状态</span>
                            <strong id="state-runtime-value">等待中</strong>
                        </div>
                        <div class="state-inline-meta">
                            <span>下次唤醒</span>
                            <strong id="state-wake-value">未安排</strong>
                        </div>
                    </section>

                    <section class="insight-block perception-block">
                        <div class="insight-block-head stacked">
                            <span>最近感知</span>
                            <strong id="perception-live-time">--:--</strong>
                        </div>
                        <ul id="ai-perception-list" class="perception-list"></ul>
                    </section>
                </section>

                <section class="memory-surface">
                    <div class="memory-topbar">
                        <span>AI 记忆系统</span>
                        <span class="memory-badge">待命开发</span>
                    </div>
                    <div class="memory-core">
                        <div class="memory-orb">✺</div>
                        <strong>AI 记忆系统</strong>
                        <p id="memory-summary">持久化记忆、跨会话上下文管理与语义关联能力。</p>
                    </div>
                    <div class="memory-footnote">
                        <span id="memory-counts">最近感知 0 · 行为事件 0</span>
                        <button class="memory-help" type="button" disabled>?</button>
                    </div>
                </section>
            </aside>
        </main>
    </div>

    <div id="error-log"></div>
    <script type="module" src="./panel/scripts/panelApp.js"></script>
</body>
</html>
